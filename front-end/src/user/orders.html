<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lịch sử đơn hàng - Clothes Shop</title>
    <link href="../output.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>

  <body class="bg-gray-50 text-gray-800">
    <header class="border-b border-gray-200 bg-white sticky top-0 z-50">
      <div class="container mx-auto px-6">
        <div class="flex items-center justify-between h-16">
          <a href="./index.html" class="text-xl font-bold text-black tracking-wide">
            CLOTHES SHOP
          </a>

          <nav class="hidden md:flex gap-8 text-black font-medium">
            <a href="./index.html" class="hover:opacity-70 transition">Trang chủ</a>

            <div class="relative">
              <button
                id="dropdownBtn"
                class="flex items-center gap-1 hover:opacity-70 transition"
              >
                Danh mục
                <i id="dropdownIcon" class="fa-solid fa-chevron-down text-xs transition-transform"></i>
              </button>
              <div
                id="dropdownMenu"
                class="absolute left-0 mt-3 w-44 bg-white border border-gray-200 rounded-md shadow-lg hidden z-50"
              ></div>
            </div>
          </nav>

          <div class="flex items-center gap-6 text-black">
            <div class="relative">
              <button
                id="userBtn"
                class="hover:opacity-70 transition flex items-center gap-2"
              >
                <i class="fa-regular fa-user"></i>
                <span id="username"></span>
              </button>

              <div
                id="userMenu"
                class="absolute right-0 mt-3 w-48 bg-white border border-gray-200 rounded-md shadow-lg hidden z-50"
              >
                <a href="./account/profile.html" class="block px-4 py-2 hover:bg-gray-100">Thông tin tài khoản</a>
                <a href="./orders.html" class="block px-4 py-2 hover:bg-gray-100 font-bold">Lịch sử mua hàng</a>
                <button onclick="logout()" class="w-full text-left px-4 py-2 hover:bg-gray-100 text-red-500">Đăng xuất</button>
              </div>
            </div>

            <a href="./cart.html" class="relative hover:opacity-70 transition">
              <i class="fa-solid fa-cart-shopping"></i>
              <span id="cartBadgeCount" class="absolute -top-2 -right-2 bg-black text-white text-xs w-4 h-4 rounded-full flex items-center justify-center hidden">
                0
              </span>
            </a>
          </div>
        </div>
      </div>
    </header>

    <main class="container mx-auto px-6 py-10 min-h-screen">
      <h1 class="text-3xl font-bold mb-8">Lịch sử Đơn hàng</h1>

      <div class="bg-white p-6 md:p-10 rounded-2xl shadow-sm border border-gray-100">
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="border-b border-gray-200 text-sm md:text-base">
                <th class="py-4 font-semibold text-gray-500">Mã ĐH</th>
                <th class="py-4 font-semibold text-gray-500">Ngày đặt</th>
                <th class="py-4 font-semibold text-gray-500">Tổng tiền</th>
                <th class="py-4 font-semibold text-gray-500">Trạng thái</th>
                <th class="py-4 font-semibold text-gray-500 text-center">Tác vụ</th>
              </tr>
            </thead>
            <tbody id="ordersContainer">
              <tr>
                <td colspan="5" class="py-10 text-center text-gray-500">Đang tải lịch sử đơn hàng...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <!-- Modal Xem Chi Tiết -->
    <div id="orderDetailModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-[100] px-4">
      <div class="bg-white rounded-2xl p-6 w-full max-w-2xl max-h-[90vh] flex flex-col shadow-2xl overflow-hidden relative">
        <button id="btnCloseModal" class="absolute top-4 right-4 text-gray-400 hover:text-black transition">
            <i class="fa-solid fa-xmark text-xl"></i>
        </button>
        <h3 class="text-xl font-bold mb-4">Chi tiết Đơn hàng <span id="modalOrderId" class="text-red-500"></span></h3>
        
        <div class="overflow-y-auto flex-1 pr-2">
            <!-- Thông tin giao hàng -->
            <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 mb-4 text-sm">
                <p><strong>Người nhận:</strong> <span id="modalShipName"></span></p>
                <p><strong>Số ĐT:</strong> <span id="modalShipPhone"></span></p>
                <p><strong>Địa chỉ:</strong> <span id="modalShipAddress"></span></p>
                <p><strong>Ngày đặt hàng:</strong> <span id="modalOrderDate"></span></p>
            </div>

            <!-- Bảng sản phẩm -->
            <table class="w-full text-sm text-left border-collapse">
                <thead class="bg-gray-100 rounded-lg">
                    <tr>
                        <th class="py-2 px-3 font-semibold text-gray-600 rounded-tl-lg rounded-bl-lg">Sản phẩm</th>
                        <th class="py-2 px-3 font-semibold text-gray-600">SL</th>
                        <th class="py-2 px-3 font-semibold text-gray-600 rounded-tr-lg rounded-br-lg text-right">Tổng</th>
                    </tr>
                </thead>
                <tbody id="modalItemsList" class="divide-y divide-gray-100">
                    <!-- Items -->
                </tbody>
            </table>
        </div>

        <div class="mt-4 pt-4 border-t border-gray-200 text-right">
            <p class="font-bold text-lg">Tổng cộng: <span id="modalTotal" class="text-red-600"></span></p>
        </div>
      </div>
    </div>

    <script type="module" src="./orders.js"></script>
  </body>
</html>
