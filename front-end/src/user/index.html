<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="../output.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <header class="border-b border-gray-200 bg-white">
      <div class="container mx-auto px-6">
        <div class="flex items-center justify-between h-16">
          <a href="./" class="text-xl font-bold text-black tracking-wide">
            CLOTHES SHOP
          </a>

          <nav class="hidden md:flex gap-8 text-black font-medium">
            <a href="#" class="hover:opacity-70 transition">Trang chủ</a>

            <div class="relative">
              <button
                id="dropdownBtn"
                class="flex items-center gap-1 hover:opacity-70 transition"
              >
                Danh mục
                <i
                  id="dropdownIcon"
                  class="fa-solid fa-chevron-down text-xs transition-transform"
                ></i>
              </button>

              <div
                id="dropdownMenu"
                class="absolute left-0 mt-3 w-44 bg-white border border-gray-200 rounded-md shadow-lg hidden z-50"
              ></div>
            </div>
          </nav>

          <div class="flex items-center gap-6 text-black">
            <form action="./search.html" method="GET" class="relative hidden md:block">
              <input
                type="text"
                name="keyword"
                placeholder="Tìm kiếm"
                class="w-72 border border-gray-300 rounded-full pl-12 pr-5 py-2.5 text-base focus:outline-none focus:border-black transition"
                required
              />
              <button type="submit" class="absolute left-4 top-1/2 -translate-y-1/2">
                <i class="fa-solid fa-magnifying-glass text-gray-500 text-sm hover:text-black transition"></i>
              </button>
            </form>

            <div class="relative">
              <button
                id="userBtn"
                class="hover:opacity-70 transition flex items-center gap-2"
              >
                <i class="fa-regular fa-user"></i>
                <span id="username"></span>
              </button>

              <!-- USER DROPDOWN -->
              <div
                id="userMenu"
                class="absolute right-0 mt-3 w-48 bg-white border border-gray-200 rounded-md shadow-lg hidden z-50"
              >
                <a
                  href="./account/profile.html"
                  class="block px-4 py-2 hover:bg-gray-100"
                >
                  Thông tin tài khoản
                </a>
                <a
                  href="./orders.html"
                  class="block px-4 py-2 hover:bg-gray-100"
                >
                  Lịch sử mua hàng
                </a>
                <a
                  id="adminLink"
                  href="../admin/index.html"
                  class="block px-4 py-2 hover:bg-gray-100 hidden"
                  >MyAdmin</a
                >
                <button
                  onclick="logout()"
                  class="w-full text-left px-4 py-2 hover:bg-gray-100 text-red-500"
                >
                  Đăng xuất
                </button>
              </div>
            </div>

            <a href="./cart.html" class="relative hover:opacity-70 transition">
              <i class="fa-solid fa-cart-shopping"></i>
              <span
                id="cartBadgeCount"
                class="absolute -top-2 -right-2 bg-black text-white text-xs w-4 h-4 rounded-full flex items-center justify-center hidden"
              >
                0
              </span>
            </a>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="overflow-hidden mt-2 rounded-xl">
        <img
          class="w-full h-full object-cover"
          src="../image/banner (2).png"
          alt="banner"
        />
      </section>

      <div>
        <div class="container mx-auto px-6 py-10 space-y-14">
          <section>
            <h2 class="text-2xl font-semibold mb-6">Sản phẩm mới</h2>
            <div
              id="newProduct"
              class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6"
            ></div>
          </section>
          <section>
            <h2 class="text-2xl font-semibold mb-6">Sản phẩm bán chạy</h2>
            <div
              id="bestSellerProducts"
              class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6"
            ></div>
          </section>
        </div>
      </div>
    </main>
    <footer>
      <p class="text-center text-base p-4">Thuộc quyền sở hửu bởi DCT123C1!</p>
    </footer>
    <script type="module">
      import '../utils/header.js';
      import { loadCategories, renderCategory } from '../api/category.js';
      import { getProducts, renderProduct } from '../api/product.js';
      import { startCategorySync, startProductSync } from '../utils/sync.js';

      async function renderHome() {
        const [resNew, resBest] = await Promise.all([
          getProducts("limit=8"),
          getProducts("limit=8&sort=sold_count")
        ]);
        renderProduct(resNew?.data || [],  "newProduct");
        renderProduct(resBest?.data || [],  "bestSellerProducts");
      }

      document.addEventListener('DOMContentLoaded', async () => {
        // Initial load
        const categories = await loadCategories();
        renderCategory(categories, "dropdownMenu");

        await renderHome();

        // Auto-sync: categories every 30s, products every 20s
        startCategorySync(cats => renderCategory(cats, "dropdownMenu"), 30_000);
        setInterval(renderHome, 20_000);
      });
    </script>
  </body>
</html>
