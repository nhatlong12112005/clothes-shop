<!doctype html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thông tin cá nhân - Clothes Shop</title>
    <link href="../../output.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body class="bg-gray-50 text-gray-800">

    <header class="border-b border-gray-200 bg-white">
      <div class="container mx-auto px-6">
        <div class="flex items-center justify-between h-16">
          <a href="../index.html" class="text-xl font-bold text-black tracking-wide">
            CLOTHES SHOP
          </a>

          <nav class="hidden md:flex gap-8 text-black font-medium">
            <a href="../index.html" class="hover:opacity-70 transition">Trang chủ</a>

            <div class="relative">
              <button
                id="dropdownBtn"
                class="flex items-center gap-1 hover:opacity-70 transition"
              >
                Danh mục
                <i
                  id="dropdownIcon"
                  class="fa-solid fa-chevron-down text-xs transition-transform"
                ></i>
              </button>

              <div
                id="dropdownMenu"
                class="absolute left-0 mt-3 w-44 bg-white border border-gray-200 rounded-md shadow-lg hidden z-50"
              ></div>
            </div>
          </nav>

          <div class="flex items-center gap-6 text-black">
            <form action="../search.html" method="GET" class="relative hidden md:block">
              <input
                type="text"
                name="keyword"
                placeholder="Tìm kiếm"
                class="w-72 border border-gray-300 rounded-full pl-12 pr-5 py-2.5 text-base focus:outline-none focus:border-black transition"
                required
              />
              <button type="submit" class="absolute left-4 top-1/2 -translate-y-1/2">
                <i class="fa-solid fa-magnifying-glass text-gray-500 text-sm hover:text-black transition"></i>
              </button>
            </form>

            <div class="relative">
              <button
                id="userBtn"
                class="hover:opacity-70 transition flex items-center gap-2"
              >
                <i class="fa-regular fa-user"></i>
                <span id="username"></span>
              </button>

              <!-- USER DROPDOWN -->
              <div
                id="userMenu"
                class="absolute right-0 mt-3 w-48 bg-white border border-gray-200 rounded-md shadow-lg hidden z-50"
              >
                <a
                  href="./profile.html"
                  class="block px-4 py-2 hover:bg-gray-100"
                >
                  Thông tin tài khoản
                </a>
                <a
                  href="../orders.html"
                  class="block px-4 py-2 hover:bg-gray-100"
                >
                  Lịch sử mua hàng
                </a>
                <a
                  id="adminLink"
                  href="../../admin/index.html"
                  class="block px-4 py-2 hover:bg-gray-100 hidden"
                  >MyAdmin</a
                >
                <button
                  onclick="logout()"
                  class="w-full text-left px-4 py-2 hover:bg-gray-100 text-red-500"
                >
                  Đăng xuất
                </button>
              </div>
            </div>

            <a href="../cart.html" class="relative hover:opacity-70 transition">
              <i class="fa-solid fa-cart-shopping"></i>
              <span
                id="cartBadgeCount"
                class="absolute -top-2 -right-2 bg-black text-white text-xs w-4 h-4 rounded-full flex items-center justify-center hidden"
              >
                0
              </span>
            </a>
          </div>
        </div>
      </div>
    </header>

    <main class="container mx-auto px-6 py-10">
        <div class="flex flex-col md:flex-row gap-8">
            
            <!-- Sidebar Navigation -->
            <aside class="w-full md:w-1/4">
                <div class="bg-white rounded-xl shadow-sm border p-6">
                    <div class="flex items-center gap-4 mb-8">
                        <div class="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex justify-center items-center text-xl font-bold">
                            <i class="fa-regular fa-user"></i>
                        </div>
                        <div>
                            <p class="text-sm text-gray-500">Tài khoản của</p>
                            <p class="font-bold text-lg" id="sidebarName">...</p>
                        </div>
                    </div>
                    
                    <ul class="space-y-2">
                        <li>
                            <a href="./profile.html" class="flex items-center gap-3 px-4 py-3 rounded-lg bg-blue-50 text-blue-600 font-medium transition cursor-pointer">
                                <i class="fa-regular fa-id-badge w-5"></i>
                                Thông tin tài khoản
                            </a>
                        </li>
                        <li>
                            <a href="../orders.html" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-black font-medium transition cursor-pointer">
                                <i class="fa-solid fa-box w-5"></i>
                                Lịch sử đơn hàng
                            </a>
                        </li>
                        <li class="pt-4 mt-2 border-t">
                            <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-red-500 hover:bg-red-50 font-medium transition cursor-pointer text-left">
                                <i class="fa-solid fa-right-from-bracket w-5"></i>
                                Đăng xuất
                            </button>
                        </li>
                    </ul>
                </div>
            </aside>

            <!-- Main Content Area -->
            <section class="w-full md:w-3/4">
                <div class="bg-white rounded-xl shadow-sm border p-8">
                    <h2 class="text-2xl font-bold mb-2">Hồ Sơ Của Tôi</h2>
                    <p class="text-gray-500 mb-8 pb-4 border-b">Quản lý thông tin hồ sơ để bảo mật tài khoản</p>

                    <form id="profileForm" class="max-w-2xl space-y-6">
                        <!-- Error/Success Blocks -->
                        <div id="errorMsg" class="hidden bg-red-50 text-red-600 p-4 rounded-lg text-sm font-medium border border-red-100"></div>
                        <div id="successMsg" class="hidden bg-green-50 text-green-600 p-4 rounded-lg text-sm font-medium border border-green-100"></div>

                        <!-- Info Grid -->
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center">
                            <label class="text-gray-600 font-medium md:text-right px-4">Tên đăng nhập</label>
                            <div class="md:col-span-2">
                                <input type="text" id="usernameInput" class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:border-blue-500" required />
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center">
                            <label class="text-gray-600 font-medium md:text-right px-4">Email</label>
                            <div class="md:col-span-2">
                                <input type="email" id="emailInput" class="w-full border border-gray-200 bg-gray-50 rounded px-4 py-2 text-gray-500 outline-none cursor-not-allowed" disabled />
                                <p class="text-xs text-gray-400 mt-1">Email không thể thay đổi</p>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center">
                            <label class="text-gray-600 font-medium md:text-right px-4">Số điện thoại</label>
                            <div class="md:col-span-2">
                                <input type="tel" id="phoneInput" class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:border-blue-500" placeholder="Chưa cập nhật" />
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 h-full">
                            <label class="text-gray-600 font-medium mt-2 md:text-right px-4">Địa chỉ giao hàng</label>
                            <div class="md:col-span-2">
                                <textarea id="addressInput" rows="3" class="w-full border border-gray-300 rounded px-4 py-2 focus:outline-none focus:border-blue-500" placeholder="Chưa cập nhật"></textarea>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-center mt-8">
                            <div class="hidden md:block"></div>
                            <div class="md:col-span-2">
                                <button type="submit" id="btnSave" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-8 py-2.5 rounded shadow-sm transition">
                                    Lưu Thay Đổi
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </section>

        </div>
    </main>

    <footer class="bg-white border-t mt-12 w-full">
        <p class="text-center text-gray-600 text-sm p-6">Thuộc quyền sở hữu bởi DCT123C1!</p>
    </footer>


    <script type="module" src="./profile.js"></script>
</body>
</html>
