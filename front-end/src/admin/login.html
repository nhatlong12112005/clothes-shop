<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <title>Admin Đăng Nhập</title>
</head>
<body class="bg-gray-100 font-sans">
  <header class="border-b border-gray-200 bg-white">
    <div class="container mx-auto px-6 flex items-center justify-between h-16">
      <a href="./index.html" class="text-2xl font-bold text-black">CLOTHES SHOP - Admin</a>
    </div>
  </header>

  <main class="container mx-auto px-4 py-12 flex justify-center">
    <section class="bg-white p-8 rounded shadow-md w-full max-w-md">
      <h1 class="text-2xl font-bold text-center mb-6">Đăng nhập Admin</h1>
      <form id="adminLoginForm" class="space-y-4">
        <div>
          <input type="email" id="email" placeholder="Email" required class="w-full border-b border-gray-300 focus:border-black outline-none py-2 placeholder-gray-400" />
        </div>
        <div>
          <input type="password" id="password" placeholder="Mật khẩu" required class="w-full border-b border-gray-300 focus:border-black outline-none py-2 placeholder-gray-400" />
        </div>
        <div>
          <button type="submit" class="w-full bg-black text-white py-2 font-bold uppercase hover:bg-gray-800 transition">Đăng nhập</button>
        </div>
        <div class="text-sm text-center text-gray-600">
          <a href="../user/account/login.html" class="hover:text-black transition">Quay lại trang người dùng</a>
        </div>
      </form>
    </section>
  </main>

  <script type="module" src="./login.js"></script>
</body>
</html>
